name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - run: dotnet restore

      - run: dotnet build -c Release -p:Version=${{ steps.ver.outputs.VERSION }} --no-restore

      - run: dotnet test -c Release --no-build
        if: matrix.rid == 'win-x64'

      - run: dotnet publish src/TypeWhisper.Windows -c Release -r ${{ matrix.rid }} -p:Version=${{ steps.ver.outputs.VERSION }} -o publish

      - name: Copy built-in plugins to publish
        shell: pwsh
        run: |
          $pluginsSrc = "src/TypeWhisper.Windows/bin/Release/net10.0-windows/Plugins"
          if (Test-Path $pluginsSrc) {
            Copy-Item -Path $pluginsSrc -Destination "publish/Plugins" -Recurse
          }

      - run: dotnet tool install -g vpk

      - name: Velopack Pack
        shell: pwsh
        run: |
          vpk pack `
            --packId TypeWhisper `
            --packVersion ${{ steps.ver.outputs.VERSION }} `
            --packDir publish `
            --mainExe TypeWhisper.exe `
            --icon src/TypeWhisper.Windows/Resources/Icons/app.ico `
            --channel ${{ matrix.rid }} `
            --outputDir releases

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: releases/*

  trigger-website:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        run: |
          gh api repos/TypeWhisper/typewhisper.com/dispatches \
            -f event_type=release-published
        env:
          GITHUB_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          TAG="${{ github.ref_name }}"

          # Check if a draft release already exists (manual feature release notes)
          EXISTING_DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null || echo "")

          if [ "$EXISTING_DRAFT" = "true" ]; then
            echo "Draft release found for $TAG. Uploading assets and publishing..."
            gh release upload "$TAG" artifacts/* --clobber
            gh release edit "$TAG" --draft=false ${{ contains(github.ref_name, '-') && '--prerelease' || '' }}
          elif [ "$EXISTING_DRAFT" = "false" ]; then
            echo "Published release found for $TAG. Uploading assets..."
            gh release upload "$TAG" artifacts/* --clobber
          else
            echo "No existing release. Generating notes from commits..."

            # Find previous tag
            PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')

            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..${TAG}"
            else
              RANGE="$TAG"
            fi

            # Parse commits into categories
            FEATURES=""
            FIXES=""
            OTHER=""

            while IFS= read -r line; do
              [ -z "$line" ] && continue

              MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')

              # Filter out noise
              echo "$MSG" | grep -qiE '^(Merge |chore: bump|chore\(release\)|docs: update README)' && continue

              if echo "$MSG" | grep -qE '^feat(\(.*\))?:'; then
                ENTRY=$(echo "$MSG" | sed 's/^feat\(([^)]*)\)\{0,1\}: //')
                FEATURES="${FEATURES}- ${ENTRY}\n"
              elif echo "$MSG" | grep -qE '^fix(\(.*\))?:'; then
                ENTRY=$(echo "$MSG" | sed 's/^fix\(([^)]*)\)\{0,1\}: //')
                FIXES="${FIXES}- ${ENTRY}\n"
              else
                ENTRY=$(echo "$MSG" | sed 's/^[a-z]*\(([^)]*)\)\{0,1\}: //')
                OTHER="${OTHER}- ${ENTRY}\n"
              fi
            done <<< "$(git log --oneline --no-merges "$RANGE")"

            # Build release notes
            NOTES=""
            if [ -n "$FEATURES" ]; then
              NOTES="${NOTES}## New Features\n${FEATURES}\n"
            fi
            if [ -n "$FIXES" ]; then
              NOTES="${NOTES}## Bug Fixes\n${FIXES}\n"
            fi
            if [ -n "$OTHER" ]; then
              NOTES="${NOTES}## Other Changes\n${OTHER}\n"
            fi

            if [ -z "$NOTES" ]; then
              NOTES="Maintenance release ${TAG}"
            fi

            PRERELEASE_FLAG=""
            if [[ "$TAG" == *-* ]]; then
              PRERELEASE_FLAG="--prerelease"
            fi

            gh release create "$TAG" artifacts/* \
              --title "$TAG" \
              --notes "$(printf '%b' "$NOTES")" \
              $PRERELEASE_FLAG
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
