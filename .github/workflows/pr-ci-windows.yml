name: PR CI (Windows)

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-windows-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Build.props

      - name: Create artifact directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/logs | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/test-results | Out-Null

      - name: Restore solution
        run: dotnet restore TypeWhisper.slnx

      - name: Restore CLI
        run: dotnet restore src/TypeWhisper.Cli/TypeWhisper.Cli.csproj

      - name: Build solution
        run: dotnet build TypeWhisper.slnx -c Release --no-restore -bl:artifacts/logs/typewhisper-solution.binlog

      - name: Build CLI
        run: dotnet build src/TypeWhisper.Cli/TypeWhisper.Cli.csproj -c Release --no-restore -bl:artifacts/logs/typewhisper-cli.binlog

      - name: Test TypeWhisper.Core
        run: dotnet test tests/TypeWhisper.Core.Tests/TypeWhisper.Core.Tests.csproj -c Release --no-build --logger "trx;LogFileName=TypeWhisper.Core.Tests.trx" --results-directory artifacts/test-results

      - name: Test plugin system
        run: dotnet test tests/TypeWhisper.PluginSystem.Tests/TypeWhisper.PluginSystem.Tests.csproj -c Release --no-build --logger "trx;LogFileName=TypeWhisper.PluginSystem.Tests.trx" --results-directory artifacts/test-results

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pr-ci-windows-artifacts
          path: |
            artifacts/logs/*.binlog
            artifacts/test-results/*.trx
          if-no-files-found: ignore
