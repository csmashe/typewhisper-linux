name: Plugins Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugins-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-plugins:
    runs-on: windows-latest
    outputs:
      projects: ${{ steps.discover.outputs.projects }}
      has_projects: ${{ steps.discover.outputs.has_projects }}
      scan_mode: ${{ steps.discover.outputs.scan_mode }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: discover
        shell: pwsh
        run: |
          $allProjects = @(Get-ChildItem plugins -Recurse -Filter *.csproj | Sort-Object FullName)
          if ($allProjects.Count -eq 0) {
            throw "No plugin projects found under plugins/."
          }

          $runAll = $env:GITHUB_EVENT_NAME -ne 'pull_request'
          $selectedPluginDirs = [ordered]@{}
          $changedFiles = @()

          if (-not $runAll) {
            $baseSha = '${{ github.event.pull_request.base.sha }}'
            $changedFiles = @(git diff --name-only $baseSha HEAD | ForEach-Object { $_.Replace('\', '/') })

            foreach ($file in $changedFiles) {
              if (
                $file -eq '.github/workflows/plugins-smoke.yml' -or
                $file -eq 'Directory.Build.props' -or
                $file -like 'src/TypeWhisper.PluginSDK/*'
              ) {
                $runAll = $true
                break
              }

              if ($file -match '^plugins/([^/]+)/') {
                $selectedPluginDirs[$Matches[1]] = $true
              }
            }
          }

          $projects = @()
          foreach ($project in $allProjects) {
            $relativePath = $project.FullName.Replace($env:GITHUB_WORKSPACE + [System.IO.Path]::DirectorySeparatorChar, '').Replace('\', '/')
            $parts = $relativePath.Split('/')
            $pluginDir = if ($parts.Count -ge 2) { $parts[1] } else { '' }

            if ($runAll -or $selectedPluginDirs.Contains($pluginDir)) {
              $projects += [ordered]@{
                name = $project.BaseName
                path = $relativePath
              }
            }
          }

          $scanMode = if ($runAll) { 'all' } elseif ($projects.Count -gt 0) { 'changed' } else { 'none' }
          $json = if ($projects.Count -gt 0) { ConvertTo-Json -InputObject $projects -Compress -Depth 3 -AsArray } else { '[]' }
          $hasProjects = if ($projects.Count -gt 0) { 'true' } else { 'false' }

          Write-Host "Plugin smoke scan mode: $scanMode"
          if ($changedFiles.Count -gt 0) {
            Write-Host "Changed files:"
            $changedFiles | ForEach-Object { Write-Host "  $_" }
          }
          if ($projects.Count -gt 0) {
            Write-Host "Selected plugin projects:"
            $projects | ForEach-Object { Write-Host "  $($_.path)" }
          } else {
            Write-Host "No plugin projects selected for this pull request."
          }

          "projects=$json" >> $env:GITHUB_OUTPUT
          "has_projects=$hasProjects" >> $env:GITHUB_OUTPUT
          "scan_mode=$scanMode" >> $env:GITHUB_OUTPUT

  validate-metadata:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate plugin manifests and localization files
        shell: pwsh
        run: |
          $errors = [System.Collections.Generic.List[string]]::new()

          foreach ($manifestPath in Get-ChildItem plugins -Recurse -Filter manifest.json | Sort-Object FullName) {
            try {
              $manifest = Get-Content $manifestPath.FullName -Raw | ConvertFrom-Json
            } catch {
              $errors.Add("Invalid JSON in $($manifestPath.FullName): $($_.Exception.Message)")
              continue
            }

            foreach ($key in 'id', 'name', 'version', 'assemblyName', 'pluginClass') {
              if ([string]::IsNullOrWhiteSpace([string]$manifest.$key)) {
                $errors.Add("Missing or empty '$key' in $($manifestPath.FullName)")
              }
            }

            if ($manifest.assemblyName -and -not ([string]$manifest.assemblyName).EndsWith('.dll')) {
              $errors.Add("assemblyName must end with .dll in $($manifestPath.FullName)")
            }

            $localizationDir = Join-Path $manifestPath.Directory.FullName 'Localization'
            if (Test-Path $localizationDir) {
              foreach ($locPath in Get-ChildItem $localizationDir -Filter *.json | Sort-Object FullName) {
                try {
                  $localization = Get-Content $locPath.FullName -Raw | ConvertFrom-Json -AsHashtable
                } catch {
                  $errors.Add("Invalid JSON in $($locPath.FullName): $($_.Exception.Message)")
                  continue
                }

                if ($localization -isnot [System.Collections.IDictionary]) {
                  $errors.Add("Localization file must contain a JSON object: $($locPath.FullName)")
                }
              }
            }
          }

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

  build-plugin:
    needs: discover-plugins
    if: needs.discover-plugins.outputs.has_projects == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.projects) }}

    steps:
      - uses: actions/checkout@v6

      - name: Ensure NuGet global packages folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path (Join-Path $env:USERPROFILE '.nuget\packages') | Out-Null

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Build.props

      - name: Create artifact directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path artifacts/logs | Out-Null

      - name: Restore ${{ matrix.plugin.name }}
        run: dotnet restore ${{ matrix.plugin.path }}

      - name: Build ${{ matrix.plugin.name }}
        run: dotnet build ${{ matrix.plugin.path }} -c Release --no-restore -bl:artifacts/logs/${{ matrix.plugin.name }}.binlog

      - name: Validate built output
        shell: pwsh
        run: |
          $projectPath = Resolve-Path "${{ matrix.plugin.path }}"
          $projectDir = Split-Path $projectPath -Parent
          $manifestPath = Join-Path $projectDir 'manifest.json'
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $outputDir = Join-Path $projectDir 'bin/Release/net10.0-windows'
          $assemblyPath = Join-Path $outputDir $manifest.assemblyName
          $copiedManifestPath = Join-Path $outputDir 'manifest.json'

          if (-not (Test-Path $assemblyPath)) {
            throw "Expected plugin assembly not found: $assemblyPath"
          }

          if (-not (Test-Path $copiedManifestPath)) {
            throw "manifest.json was not copied to output: $copiedManifestPath"
          }

          $localizationSourceDir = Join-Path $projectDir 'Localization'
          if (Test-Path $localizationSourceDir) {
            $builtLocalizationDir = Join-Path $outputDir 'Localization'
            if (-not (Test-Path $builtLocalizationDir)) {
              throw "Built localization directory missing: $builtLocalizationDir"
            }
          }

          $scriptSourceDir = Join-Path $projectDir 'Scripts'
          if (Test-Path $scriptSourceDir) {
            $builtScriptDir = Join-Path $outputDir 'Scripts'
            if (-not (Test-Path $builtScriptDir)) {
              throw "Built scripts directory missing: $builtScriptDir"
            }
          }

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: plugins-smoke-${{ matrix.plugin.name }}
          path: artifacts/logs/*.binlog
          if-no-files-found: ignore
