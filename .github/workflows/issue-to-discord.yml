name: Issue Link Relay

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Post only issue link to Discord #issues
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_ISSUES_CHANNEL_ID }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_BOT_TOKEN:-}" ] || [ -z "${DISCORD_CHANNEL_ID:-}" ]; then
            echo "Missing required secrets: DISCORD_BOT_TOKEN, DISCORD_ISSUES_CHANNEL_ID"
            exit 1
          fi

          CONTENT="[GH-ISSUE] ${REPO} #${ISSUE_NUMBER}\n${ISSUE_URL}"
          jq -n --arg content "$CONTENT" '{content:$content}' > payload.json

          curl -sS -X POST "https://discord.com/api/v10/channels/${DISCORD_CHANNEL_ID}/messages" \
            -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @payload.json > /dev/null
